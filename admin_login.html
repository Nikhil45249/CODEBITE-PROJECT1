<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | GigShield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons for the Shield and Eye -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
        }

        .login-card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
        }

        .input-field {
            background-color: #1e293b;
            border: 1px solid #334155;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #14b8a6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.1);
        }

        .btn-teal {
            background-color: #0d9488;
            transition: all 0.2s ease;
        }

        .btn-teal:hover {
            background-color: #14b8a6;
            transform: translateY(-1px);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Header Section -->
    <div class="text-center mb-8">
        <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-2xl border-2 border-teal-500/30 bg-teal-500/10 mb-4">
            <i data-lucide="shield" class="w-8 h-8 text-teal-500"></i>
        </div>
        <h1 class="text-4xl font-bold text-white tracking-tight">GigShield</h1>
        <p class="text-gray-400 text-xs uppercase tracking-[0.2em] mt-2 font-semibold">Parametric Insurance Platform</p>
    </div>

    <!-- Login Card -->
    <div class="login-card w-full max-w-md rounded-3xl p-8 shadow-2xl">

        <!-- Navigation Header -->
        <div class="flex items-center space-x-3 mb-8">
            <a href="index.html" class="flex items-center text-gray-400 hover:text-white text-sm transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i> Back
            </a>
            <span
                class="bg-teal-500/10 text-teal-400 text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md">
                Admin Portal
            </span>
        </div>

        <!-- Form -->
        <form class="space-y-6">
            <!-- Email -->
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Email</label>
                <input id="email" type="email" placeholder="admin@gigshield.in"
                    class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-600">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <input id="password" type="password" placeholder="••••••••"
                        class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-gray-600">
                    <button type="button"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-teal-400">
                        <i data-lucide="eye" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- Sign In Button -->
            <button type="submit" class="btn-teal w-full py-4 rounded-xl text-white font-bold text-sm">
                Sign In
            </button>
        </form>

        <!-- Demo Info Box -->
        <div class="mt-8 p-3 rounded-xl bg-slate-950/50 border border-slate-800 text-center">
            <p class="text-gray-500 text-[11px]">
                <span class="font-bold text-gray-400">Demo:</span> admin@gigshield.in / admin123
            </p>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Handle Form Submission (Admin Login Check)
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            const btn = e.target.querySelector('button[type="submit"]');

            // ONLY ADMIN LOGIN
            const ADMIN_EMAIL = "admin@gigshield.in";
            const ADMIN_PASSWORD = "admin123";

            if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                btn.innerHTML = "Signing in...";
                btn.style.opacity = "0.7";

                setTimeout(() => {
                    window.location.href = 'admin_dashboard.html';
                }, 1000);
            } else {
                alert("Invalid admin credentials ❌");
            }
        });
    </script>
</body>

</html>
